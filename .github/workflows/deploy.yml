# Builds the Vite app and pushes static output to the gh-pages branch for GitHub Pages.
# Runs on push to main when website/** or this file changes (path filter). Scraper commits to
# website/public/data/ therefore trigger deploy; scraper-only pushes do not.
name: Deploy to GitHub Pages

on:
  workflow_dispatch: # Run after setting repo variable CUSTOM_DOMAIN (no code push needed)
  push:
    branches: [main]
    paths:
      # Skip deploy when only scraper/docs change and no website files — data updates always touch website/public/data/
      - "website/**"
      - ".github/workflows/deploy.yml"

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Set build version metadata
        run: |
          SITE_VER=$(node -p "require('./website/package.json').version")
          SCR_VER=$(tr -d ' \n\r\t' < scraper/VERSION)
          echo "VITE_APP_VERSION=v${SITE_VER}" >> "$GITHUB_ENV"
          echo "VITE_SCRAPER_VERSION=v${SCR_VER}" >> "$GITHUB_ENV"
          echo "VITE_BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_ENV"

      # Custom domain (repo variable CUSTOM_DOMAIN): root path / and gh-pages CNAME. Omit variable to keep
      # default project-site URL https://<user>.github.io/<repo>/
      - name: Set deploy base for Pages
        run: |
          if [ -n "${{ vars.CUSTOM_DOMAIN }}" ]; then
            echo "DEPLOY_BASE=/" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_BASE=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi

      - name: Build
        working-directory: website
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ADMIN_USERNAME: ${{ secrets.VITE_ADMIN_USERNAME }}
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_ADMIN_ALLOW_DEMO: ${{ vars.VITE_ADMIN_ALLOW_DEMO }}
        run: npm run build

      - name: Add CNAME for custom domain
        if: ${{ vars.CUSTOM_DOMAIN != '' }}
        run: echo "${{ vars.CUSTOM_DOMAIN }}" > website/dist/CNAME

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: website/dist
          force_orphan: true
