# Scraper: fetch portals, validate JSON, sync website/public/data, optional CSV + commit.
name: Scraper

on:
  workflow_dispatch:
    inputs:
      export_csv:
        description: Generate scraper/output/csv/*.csv
        type: boolean
        default: false
      commit_data:
        description: Commit website/public/data and scraper/output (if changed)
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          pip install -r scraper/requirements-dev.txt

      - name: Pytest
        working-directory: scraper
        run: python -m pytest tests/ -q

      - name: Run scraper
        working-directory: scraper
        env:
          SCRAPER_SKIP_WEBSITE_SYNC: "1"
        run: python main.py

      - name: Validate output
        working-directory: scraper
        run: python validate_output.py --strict-run

      - name: Sync to website public data
        working-directory: scraper
        run: python sync_to_website.py

      - name: Export CSV
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.export_csv == 'true'
        working-directory: scraper
        run: python export_csv.py

      - name: Commit data
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.commit_data == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/public/data || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update scraper and website data"
            git push
          fi
